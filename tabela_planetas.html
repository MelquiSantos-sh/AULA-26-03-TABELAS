<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/tabela_planetas.css">
    <title>Document</title>
</head>
<body>
     <table>
        <caption>Distância em relação ao <span class="destacar">Sol</span></caption>
        <tr>
            <th>Planeta</th>
            <th>Nome</th>
            <th class="distancia">Distância</th>
        </tr>
        <tr>
            <td><img src="/terra.png" alt="terra" width="100px"></td>
            <td class="planetas">Terra</td>
            <td class="destacardois fonte">1 AU</td>
        </tr>
        <tr>
            <td><img src="/venus.png" alt="venus" width="100px"></td>
            <td class="planetas">Vênus</td>
            <td class="fonte">0.75 AU</td>
        </tr>
        <tr>
            <td><img src="/marte.png" alt="marte" width="100px"></td>
            <td class="planetas">Marte</td>
            <td class="fonte">1.52 AU</td>
        </tr>
        <tr>
            <td><img src="/jupter.png" alt="jupiter" width="100px"></td>
            <td class="planetas">Jupiter</td>
            <td class="fonte">5.20 AU</td>
        </tr>
        <tr>
            <td><img src="/saturno.png" alt="saturno" width="100px"></td>
            <td class="planetas">Saturno</td>
            <td class="fonte">9.58 AU</td>
        </tr>
    </table>
</body>
</html>
